    <style>
        :root {
            --gold: #D4AF37;
            --onyx: #050505;
            --sky-top: #87CEEB;
            --sky-bottom: #1E3A8A;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--onyx);
            color: #f8fafc;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-futuristic { font-family: 'Orbitron', sans-serif; }

        .window-frame-container {
            pointer-events: none;
            background: #050505;
            mask: radial-gradient(ellipse 40% 65% at 50% 50%, transparent 99%, black 100%);
            -webkit-mask: radial-gradient(ellipse 35% 60% at 50% 50%, transparent 98%, black 100%);
        }

        .window-rim {
            border: 20px solid #1a1a1a;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 0 30px rgba(212, 175, 55, 0.1);
        }

        .sky-gradient {
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        .shimmer-text {
            background: linear-gradient(90deg, #fff, #d4af37, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 5s linear infinite;
        }

        .gold-border-glow {
            border-color: rgba(212, 175, 55, 0.4);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.15);
        }

        .reveal-content {
            position: relative;
            z-index: 50;
            background: var(--onyx);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #d4af37; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }
        .animate-float { animation: float 10s ease-in-out infinite; }
